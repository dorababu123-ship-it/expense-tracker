<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Expense Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <h1>Expense Tracker</h1>
      <p class="subtitle">Track your income & spending easily.</p>

      <!-- Summary Section -->
      <div class="summary">
        <div class="card balance">
          <div class="label">Current Balance</div>
          <div id="balance" class="value">₹0</div>
        </div>

        <div class="card income">
          <h3>Total Income</h3>
          <div id="total-income" class="value">₹0</div>
        </div>

        <div class="card expense">
          <h3>Total Expense</h3>
          <div id="total-expense" class="value">₹0</div>
        </div>
      </div>

      <div class="grid">
        <!-- Form Section -->
        <div>
          <div class="section-title">Add Transaction</div>

          <form id="transaction-form">
            <div class="field">
              <label>Description</label>
              <input
                id="description"
                type="text"
                placeholder="e.g. Tea, Salary"
                required
              />
            </div>

            <div class="row">
              <div class="field">
                <label>Amount (₹)</label>
                <input
                  id="amount"
                  type="number"
                  step="0.01"
                  placeholder="e.g. 500"
                  required
                />
              </div>

              <div class="field">
                <label>Type</label>
                <select id="type">
                  <option value="income">Income</option>
                  <option value="expense">Expense</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div class="field">
                <label>Category</label>
                <input
                  id="category"
                  type="text"
                  placeholder="Food, Travel..."
                />
              </div>

              <div class="field">
                <label>Date</label>
                <input id="date" type="date" />
              </div>
            </div>

            <div class="actions">
              <button class="btn-primary" type="submit">+ Add</button>
              <button class="btn-outline" type="button" id="clear-all">
                Clear All
              </button>
            </div>
          </form>
        </div>

        <!-- Transactions Section -->
        <div>
          <div class="section-title">Transactions</div>

          <div class="transactions-panel">
            <div class="filters">
              <label>Filter:</label>
              <select id="filter-type">
                <option value="all">All</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>

            <table class="transactions-table">
              <thead>
                <tr>
                  <th>Description</th>
                  <th>Category</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Date</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="transactions-body"></tbody>
            </table>

            <div id="empty-state" class="empty-state">
              No transactions yet. Add your first one!
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
